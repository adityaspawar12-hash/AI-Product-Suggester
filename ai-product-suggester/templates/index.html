<!DOCTYPE html>
<html>
<head>
    <title>AI Product Recommender</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins';
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        h1 { font-size: 55px; }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            margin: 5px;
        }

        .card {
            background: white;
            color: black;
            width: 60%;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            border-radius: 10px;
            background: #f4f4f4;
        }

        #loadMoreBtn {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #suggestions div {
            background: white;
            color: black;
            margin: 2px;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>AI Product Recommender</h1>

<form method="POST">

    <!-- SEARCH -->
    <input type="text" name="query" id="searchBox" placeholder="Search product..." required>

    <!-- AUTO SUGGEST -->
    <div id="suggestions"></div>

    <!-- PRICE SLIDER -->
    <br>
    <label>Budget: ₹<span id="val">0</span></label><br>
    <input type="range" min="1000" max="500000" value="0"
           name="budget" id="budget"
           oninput="val.innerText = this.value">

    <br>
    <button type="submit">Search</button>

</form>

<!-- TOP PRODUCT -->


<!-- PRODUCTS -->
{% for product in results %}
<div class="card product-card">

    <!-- FIXED IMAGE -->
    <img src="{{ product.image }}" 
         onerror="this.src='https://via.placeholder.com/300'">

    <h3>{{ product.title }}</h3>
    <p>₹{{ product.price_inr }}</p>
    <p>⭐ {{ product.rating }}</p>
    <p>{{ product.description }}</p>

</div>
{% endfor %}

{% if results %}
<button id="loadMoreBtn">Load More</button>
{% endif %}

<!-- JS -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    // LOAD MORE
    let cards = document.querySelectorAll(".product-card");
    let btn = document.getElementById("loadMoreBtn");
    let visible = 5;

    cards.forEach((c, i) => {
        if (i >= visible) c.style.display = "none";
    });

    if (btn) {
        btn.addEventListener("click", function () {
            let hidden = [...cards].filter(c => c.style.display === "none");

            hidden.slice(0, 5).forEach(c => c.style.display = "block");

            if (hidden.length <= 5) btn.style.display = "none";
        });
    }

    // AUTO SUGGEST
    const searchBox = document.getElementById("searchBox");
    const suggestions = document.getElementById("suggestions");

    

    searchBox.addEventListener("input", function () {
        let val = this.value.toLowerCase();
        suggestions.innerHTML = "";

        if (!val) return;

        words.filter(w => w.includes(val)).forEach(w => {
            let div = document.createElement("div");
            div.innerText = w;
            div.onclick = () => {
                searchBox.value = w;
                suggestions.innerHTML = "";
            };
            suggestions.appendChild(div);
        });
    });

});
</script>

</body>
</html>
